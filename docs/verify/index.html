<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ForgeAlloy — Verify</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'SF Mono', 'Fira Code', monospace;
    background: #0a1520;
    color: #e0e6ed;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
  .header {
    text-align: center;
    margin-bottom: 40px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, #00d4ff, #00ffc8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p {
    color: #8a92a5;
    font-size: 14px;
    margin-top: 8px;
  }
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 32px;
    max-width: 600px;
    width: 100%;
  }
  .status {
    text-align: center;
    padding: 24px;
    margin-bottom: 24px;
    border-radius: 8px;
  }
  .status.loading { background: rgba(0, 212, 255, 0.08); border: 1px solid rgba(0, 212, 255, 0.2); }
  .status.verified { background: rgba(0, 255, 200, 0.08); border: 1px solid rgba(0, 255, 200, 0.3); }
  .status.failed { background: rgba(255, 68, 68, 0.08); border: 1px solid rgba(255, 68, 68, 0.3); }
  .status.no-hash { background: rgba(255, 170, 0, 0.08); border: 1px solid rgba(255, 170, 0, 0.2); }
  .status-icon { font-size: 48px; margin-bottom: 12px; }
  .status-text { font-size: 18px; font-weight: 700; }
  .status.verified .status-text { color: #00ffc8; }
  .status.failed .status-text { color: #ff4444; }
  .status.loading .status-text { color: #00d4ff; }
  .status.no-hash .status-text { color: #ffaa00; }
  .detail { margin-top: 8px; font-size: 12px; color: #8a92a5; }
  .chain {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .chain-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 12px;
    background: rgba(0,0,0,0.2);
    border-radius: 6px;
    font-size: 12px;
  }
  .chain-key { color: #8a92a5; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .chain-value { color: #e0e6ed; font-family: monospace; max-width: 300px; overflow: hidden; text-overflow: ellipsis; }
  .chain-value.good { color: #00ffc8; }
  .chain-value.trust { color: #ffaa00; }
  .input-section {
    margin-bottom: 24px;
  }
  .input-row {
    display: flex;
    gap: 8px;
  }
  input[type="text"] {
    flex: 1;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: #e0e6ed;
    font-size: 13px;
    padding: 10px 14px;
    font-family: monospace;
    outline: none;
  }
  input:focus { border-color: #00d4ff; }
  button {
    padding: 10px 20px;
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 255, 200, 0.2));
    border: 1px solid #00d4ff;
    border-radius: 6px;
    color: #00d4ff;
    font-weight: 700;
    cursor: pointer;
    font-size: 13px;
  }
  button:hover { box-shadow: 0 0 16px rgba(0, 212, 255, 0.3); }
  .footer {
    margin-top: 40px;
    text-align: center;
    font-size: 11px;
    color: #5a6070;
  }
  .footer a { color: #00d4ff; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="header">
    <h1>ForgeAlloy — Verify</h1>
    <p>Cryptographic chain of custody verification</p>
  </div>

  <div class="card">
    <div id="status" class="status no-hash">
      <div class="status-icon">🔍</div>
      <div class="status-text">Enter an alloy URL or hash to verify</div>
      <div class="detail">Paste a HuggingFace alloy URL or scan a QR code</div>
    </div>

    <div class="input-section">
      <div class="input-row">
        <input type="text" id="alloyUrl" placeholder="Paste alloy URL or drag .alloy.json file here">
        <button onclick="verify()">Verify</button>
      </div>
      <div id="dropzone" style="margin-top:12px;padding:20px;border:2px dashed rgba(255,255,255,0.1);border-radius:8px;text-align:center;font-size:12px;color:#5a6070;cursor:pointer">
        Drop .alloy.json file here — or click to browse
        <input type="file" id="fileInput" accept=".json" style="display:none">
      </div>
    </div>

    <div id="chain" class="chain" style="display:none"></div>
  </div>

  <div class="footer">
    <a href="https://github.com/CambrianTech/forge-alloy">ForgeAlloy</a> —
    Trustless AI Compute Contract —
    <a href="https://github.com/CambrianTech/continuum">Continuum</a> —
    <a href="https://huggingface.co/continuum-ai">HuggingFace</a>
  </div>

<script>
// File drop/browse handling
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.style.borderColor = '#00d4ff'; });
dropzone.addEventListener('dragleave', () => { dropzone.style.borderColor = 'rgba(255,255,255,0.1)'; });
dropzone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropzone.style.borderColor = 'rgba(255,255,255,0.1)';
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});
fileInput.addEventListener('change', (e) => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    window._alloyContent = e.target.result;
    document.getElementById('alloyUrl').value = file.name;
    verifyContent(e.target.result, null);
  };
  reader.readAsText(file);
}

// Check URL hash on load (from QR code)
window.addEventListener('load', () => {
  const hash = window.location.hash.slice(1);
  if (hash) {
    document.getElementById('alloyUrl').value = decodeURIComponent(hash);
    verify();
  }
});

async function verifyContent(text, expectedHash) {
  const statusEl = document.getElementById('status');
  const chainEl = document.getElementById('chain');

  try {
    const alloy = JSON.parse(text);
    const encoder = new TextEncoder();
    const data = encoder.encode(text);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const actualHash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

    let hashMatch = null;
    if (expectedHash) {
      hashMatch = actualHash.startsWith(expectedHash);
    }

    if (hashMatch === false) {
      statusEl.className = 'status failed';
      statusEl.innerHTML = '<div class="status-icon">❌</div><div class="status-text">HASH MISMATCH</div><div class="detail">Expected: ' + expectedHash + '... Got: ' + actualHash.slice(0, 16) + '...</div>';
    } else {
      statusEl.className = 'status verified';
      statusEl.innerHTML = '<div class="status-icon">✅</div><div class="status-text">' + (hashMatch ? 'VERIFIED — hash matches' : 'LOADED — file verified locally') + '</div><div class="detail">sha256:' + actualHash.slice(0, 16) + '...</div>';
    }

    // Display chain (reuse existing display logic)
    chainEl.style.display = 'flex';
    chainEl.innerHTML = '';
    const addRow = (key, value, cls = '') => {
      chainEl.innerHTML += '<div class="chain-row"><span class="chain-key">' + key + '</span><span class="chain-value ' + cls + '">' + value + '</span></div>';
    };

    addRow('Name', alloy.name || 'unnamed');
    addRow('Version', alloy.version || '?');
    addRow('Source', alloy.source?.baseModel || 'unknown');
    addRow('Architecture', alloy.source?.architecture || 'unknown');
    addRow('Stages', (alloy.stages || []).map(s => s.type).join(' → '));
    addRow('Cycles', alloy.cycles || 1);
    if (alloy.target) addRow('Target Delta', Object.keys(alloy.target).join(', '), 'good');
    if (alloy.results) {
      const r = alloy.results;
      if (r.baselinePerplexity) addRow('Baseline PPL', r.baselinePerplexity.toFixed(2));
      if (r.finalPerplexity) addRow('Final PPL', r.finalPerplexity.toFixed(2), 'good');
      if (r.improvementPct) addRow('Improvement', '+' + r.improvementPct.toFixed(1) + '%', 'good');
    }
    if (alloy.results?.integrity) {
      const i = alloy.results.integrity;
      addRow('Trust Level', i.trustLevel || 'unknown', 'trust');
      if (i.code) addRow('Runner', i.code.runner + ' v' + i.code.version);
      if (i.modelHash) addRow('Model Hash', i.modelHash.slice(0, 30) + '...');
      addRow('Alloy Hash', 'sha256:' + actualHash.slice(0, 24) + '...');
      if (i.attestedAt) addRow('Attested', i.attestedAt);
    }
    if (alloy.receipt) {
      const rc = alloy.receipt;
      if (rc.publications) {
        rc.publications.forEach(p => addRow('Published', '<a href="' + p.url + '" target="_blank">' + p.target + '</a> — ' + p.publishedAt, 'good'));
      }
    }
    addRow('Tags', (alloy.tags || []).join(', '));
  } catch (err) {
    statusEl.className = 'status failed';
    statusEl.innerHTML = '<div class="status-icon">❌</div><div class="status-text">Parse error</div><div class="detail">' + err.message + '</div>';
  }
}

async function verify() {
  const input = document.getElementById('alloyUrl').value.trim();
  const statusEl = document.getElementById('status');
  const chainEl = document.getElementById('chain');

  if (!input) return;

  // Show loading
  statusEl.className = 'status loading';
  statusEl.innerHTML = '<div class="status-icon">⏳</div><div class="status-text">Verifying...</div>';
  chainEl.style.display = 'none';

  try {
    // Parse input — could be URL, URL with hash fragment, or just a hash
    let url = input;
    let expectedHash = null;

    // Known models — try each when we only have a hash
    const KNOWN_ALLOYS = [
      'https://huggingface.co/continuum-ai/qwen3.5-4b-code-forged/resolve/main/qwen3.5-4b-code-forged.alloy.json',
      'https://huggingface.co/continuum-ai/qwen3.5-27b-code-forged/resolve/main/qwen3.5-27b-code-forged.alloy.json',
    ];

    if (input.includes('#sha256:')) {
      const parts = input.split('#sha256:');
      url = parts[0];
      expectedHash = parts[1];
    } else if (input.includes('#')) {
      // Bare hash fragment (from QR code) — e.g. #857b4ca12cb7108d
      expectedHash = input.split('#').pop();
      url = null; // Will search known alloys
    } else if (input.startsWith('sha256:')) {
      expectedHash = input.slice(7);
      url = null;
    } else if (/^[0-9a-f]{8,64}$/.test(input)) {
      // Bare hex hash
      expectedHash = input;
      url = null;
    }

    // If we only have a hash, search known alloys
    if (!url || !url.startsWith('http')) {
      statusEl.innerHTML = '<div class="status-icon">🔍</div><div class="status-text">Searching for alloy...</div>';

      let found = false;
      for (const knownUrl of KNOWN_ALLOYS) {
        try {
          const resp = await fetch(knownUrl);
          if (!resp.ok) continue;
          const txt = await resp.text();
          const hashBuf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(txt));
          const h = Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');
          if (h.startsWith(expectedHash)) {
            url = knownUrl;
            found = true;
            break;
          }
        } catch { continue; }
      }

      if (!found) {
        statusEl.className = 'status no-hash';
        statusEl.innerHTML = '<div class="status-icon">⚠️</div><div class="status-text">Hash not found in known models</div><div class="detail">Paste the full URL to the .alloy.json file, or try: sha256:' + expectedHash + '</div>';
        return;
      }
    }

    // Convert HF blob URL to raw URL
    if (url.includes('/blob/')) {
      url = url.replace('/blob/', '/resolve/');
    }

    // Fetch the alloy — try direct, then CORS proxy
    let response;
    try {
      response = await fetch(url);
    } catch {
      // CORS blocked — try proxy
      response = await fetch('https://corsproxy.io/?' + encodeURIComponent(url));
    }
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const text = await response.text();
    await verifyContent(text, expectedHash);

  } catch (err) {
    statusEl.className = 'status failed';
    statusEl.innerHTML = '<div class="status-icon">❌</div><div class="status-text">Verification failed</div><div class="detail">' + err.message + '</div>';
  }
}
</script>
</body>
</html>
